<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(to right,#43e97b,#38f9d7);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:rgb(143, 127, 127);
    padding:40px;
    border-radius:15px;
    width:350px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#43e97b;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

<script>

document.getElementById('loginForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const loginData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    const response = await fetch(
        'http://localhost:3001/login',
        {
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify(loginData)
        }
    );

    const data = await response.json();

    if(data.success){

        alert(data.message);

        window.location.href = "../event-service/event.html";

    }else{

        alert(data.message);

    }

});

</script>

</body>
</html>
